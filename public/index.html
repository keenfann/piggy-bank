<!doctype html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sparkonto Barn</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; background: #f4f6fb; }
    .card { background: #fff; border-radius: 16px; padding: 16px; margin: 12px; box-shadow: 0 8px 24px rgba(0,0,0,.08); }
    .bal { font-size: 1.4rem; font-weight: 700; transition: transform .2s ease; }
    .bal:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div class="card"><h1>Sparkonto Barn</h1><p>Mobil-först PWA (svenska).</p></div>
  <div id="app"></div>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
  </script>
</body>
</html>
