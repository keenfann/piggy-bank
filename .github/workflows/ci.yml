name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Build
        run: npm run build

  docker_publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.version.outputs.release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set release version
        id: version
        run: |
          PACKAGE_MAJOR_MINOR=$(node -e "const version = JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version; const [major, minor] = version.split('.'); console.log(major + '.' + minor)")
          echo "release_version=${PACKAGE_MAJOR_MINOR}.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=main
            type=raw,value=v${{ steps.version.outputs.release_version }}
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.release_version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  docker_build_pr:
    if: github.event_name == 'pull_request'
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          build-args: |
            APP_VERSION=pr-${{ github.event.pull_request.number }}.${{ github.run_number }}
          tags: piggy-bank:pr-${{ github.event.pull_request.number }}

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: docker_publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release if missing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: v${{ needs.docker_publish.outputs.release_version }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "Release '$RELEASE_TAG' already exists."
            exit 0
          fi

          gh release create "$RELEASE_TAG" \
            --repo "$GH_REPO" \
            --target "${GITHUB_SHA}" \
            --title "$RELEASE_TAG" \
            --generate-notes
